name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - run: dotnet restore

      - run: dotnet build src/Badger.Data.sln -c Release --no-restore

      - run: dotnet test src/Badger.Data.sln -c Release --no-build

      - run: |
          dotnet pack src/Badger.Data/Badger.Data.csproj \
            -c Release \
            --no-build \
            -p:PackageVersion=${VERSION} \
            -o packages

      - uses: NuGet/login@v1
        id: login
        with:
          user:${{ secrets.NUGET_USER }} 
    
      - run: |
          dotnet nuget push packages/*.nupkg \
            --api-key ${{steps.login.outputs.NUGET_API_KEY}} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
