name: .NET Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test (matrix)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        configuration: [Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/Badger.Data.sln

      - name: Build
        run: dotnet build src/Badger.Data.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test src/Badger.Data.sln --filter Category!=Integration --configuration ${{ matrix.configuration }} --no-build --verbosity normal
